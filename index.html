<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapia Nexus - Panel Maestro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter for a modern, clean look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons (minimal set) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Custom Tailwind Configuration (optional, but good for enterprise look) */
        :root {
            --color-primary: #1a73e8; /* Google Blue */
            --color-primary-dark: #8ab4f8; /* Lighter Google Blue for dark mode */
            --color-success: #34a853; /* Google Green */
            --color-warning: #fbbc04; /* Google Yellow */
            --color-danger: #ea4335; /* Google Red */
        }
        html.dark {
            --color-text-base: #e0e0e0;
            --color-bg-base: #121212; /* Darker than gray-900 for true OLED black */
            --color-bg-card: #1f1f1f;
            --color-border: #333;
            --color-accent: var(--color-primary-dark);
        }
        html:not(.dark) {
            --color-text-base: #202124;
            --color-bg-base: #ffffff;
            --color-bg-card: #f8f9fa;
            --color-border: #dadce0;
            --color-accent: var(--color-primary);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg-base);
            color: var(--color-text-base);
            transition: background-color 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .text-google-blue { color: var(--color-primary); }
        .dark .text-google-blue { color: var(--color-primary-dark); }
        .bg-card { background-color: var(--color-bg-card); }
        .border-base { border-color: var(--color-border); }
        .text-accent { color: var(--color-accent); }
        .bg-accent-hover:hover { background-color: rgba(var(--color-accent-rgb, 26, 115, 232), 0.1); } /* Dynamic hover */
        .status-online { color: var(--color-success); }
        .status-offline { color: var(--color-danger); }
        .status-busy { color: var(--color-warning); }
        .status-pending { color: var(--color-primary); }
        .status-success { color: var(--color-success); }
        .status-failure { color: var(--color-danger); }

        /* Custom Scrollbar for dark mode */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #282828;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }
        html:not(.dark) ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        html:not(.dark) ::-webkit-scrollbar-thumb {
            background: #888;
        }
        html:not(.dark) ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 md:p-6 border-b border-base flex items-center justify-between bg-card z-10">
        <div class="flex items-center space-x-3">
            <i class="fas fa-brain text-xl text-google-blue"></i>
            <h1 class="text-2xl font-semibold text-google-blue">Zapia Nexus</h1>
        </div>
        <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-700 transition-colors">
                <i class="fas fa-sun text-lg text-gray-400 dark:hidden"></i>
                <i class="fas fa-moon text-lg text-gray-400 hidden dark:inline-block"></i>
            </button>
            <span class="text-sm md:text-base text-gray-400">Hola, Florencia</span>
            <img src="https://lh3.googleusercontent.com/ogw/AAieFMd_bVv3b-p9t-Q_qXz5Xf_r9c_0P_0gB_0l0Q=s32-c-mo" alt="User Avatar" class="w-8 h-8 rounded-full border border-gray-600">
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow p-4 md:p-6 pb-20 md:pb-6 overflow-y-auto"></main>

    <!-- Bottom Navigation Bar (Mobile-first, persistent) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-card border-t border-base flex justify-around items-center p-2 shadow-lg md:relative md:p-0 md:border-t-0 md:shadow-none">
        <button class="nav-item flex flex-col items-center justify-center p-2 flex-grow text-gray-400 hover:text-accent focus:outline-none transition-colors" data-tab="dashboard">
            <i class="fas fa-tachometer-alt text-xl mb-1"></i>
            <span class="text-xs font-medium hidden md:block">Dashboard</span>
        </button>
        <button class="nav-item flex flex-col items-center justify-center p-2 flex-grow text-gray-400 hover:text-accent focus:outline-none transition-colors" data-tab="orchestrator">
            <i class="fas fa-project-diagram text-xl mb-1"></i>
            <span class="text-xs font-medium hidden md:block">Orquestador</span>
        </button>
        <button class="nav-item flex flex-col items-center justify-center p-2 flex-grow text-gray-400 hover:text-accent focus:outline-none transition-colors" data-tab="agents">
            <i class="fas fa-users-cog text-xl mb-1"></i>
            <span class="text-xs font-medium hidden md:block">Agentes</span>
        </button>
    </nav>

    <!-- Agent Detail Modal -->
    <div id="agent-detail-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-card rounded-lg shadow-xl w-full max-w-lg overflow-hidden transform transition-all sm:my-8 sm:align-middle sm:max-w-md md:max-w-lg lg:max-w-xl">
            <div class="p-5 border-b border-base flex justify-between items-center">
                <h3 class="text-xl font-semibold text-google-blue">Detalles del Agente</h3>
                <button class="text-gray-400 hover:text-gray-200" onclick="closeAgentDetailModal()">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <div id="modal-content" class="p-5 max-h-[70vh] overflow-y-auto text-sm md:text-base">
                <!-- Content will be injected here -->
                <p class="text-gray-400">Cargando detalles...</p>
            </div>
            <div class="p-5 border-t border-base flex justify-end space-x-3">
                <button class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 transition-colors" onclick="closeAgentDetailModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // Supabase Client Placeholder (replace with your actual client initialization)
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'; // e.g., 'https://xyzcompany.supabase.co'
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // e.g., 'eyJ...';

        // In a real app, you'd initialize Supabase like this:
        // import { createClient } from '@supabase/supabase-js';
        // const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        // For this demo, we'll use mock data.

        const state = {
            activeTab: 'dashboard',
            agents: [],
            interactions: []
        };

        const appContent = document.getElementById('app-content');
        const navItems = document.querySelectorAll('.nav-item');
        const themeToggle = document.getElementById('theme-toggle');
        const agentDetailModal = document.getElementById('agent-detail-modal');
        const modalContent = document.getElementById('modal-content');

        // --- Utility Functions ---
        function formatTimestamp(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('es-ES', {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }

        function getStatusClass(status) {
            switch (status) {
                case 'online': return 'status-online';
                case 'offline': return 'status-offline';
                case 'busy': return 'status-busy';
                case 'success': return 'status-success';
                case 'failure': return 'status-failure';
                case 'pending': return 'status-pending';
                default: return 'text-gray-400';
            }
        }

        // --- Theme Toggle ---
        function applyTheme(isDark) {
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        themeToggle.addEventListener('click', () => {
            applyTheme(!document.documentElement.classList.contains('dark'));
        });

        // Initialize theme from localStorage or system preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            applyTheme(savedTheme === 'dark');
        } else {
            applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
        }

        // --- Mock Data Generation ---
        function generateMockAgents(count) {
            const agents = [];
            const statuses = ['online', 'offline', 'busy'];
            for (let i = 1; i <= count; i++) {
                const status = statuses[Math.floor(Math.random() * statuses.length)];
                agents.push({
                    id: `agent-${i}`,
                    name: `Agente ZN-${String(i).padStart(2, '0')}`,
                    status: status,
                    description: `Especializado en ${['ventas', 'soporte', 'marketing', 'automatización', 'análisis'][Math.floor(Math.random() * 5)]}.`,
                    google_account_email: `agent${i}@zapia.com`,
                    whapi_instance_id: `whapi-${Math.random().toString(36).substr(2, 9)}`,
                    whapi_token: `token-${Math.random().toString(36).substr(2, 12)}`,
                    settings: {
                        response_speed: Math.floor(Math.random() * 5) + 1, // 1-5
                        sentiment_analysis: Math.random() > 0.5,
                        language: ['es', 'en', 'pt'][Math.floor(Math.random() * 3)]
                    },
                    last_seen: new Date(Date.now() - Math.random() * 3600000).toISOString(), // last hour
                    created_at: new Date().toISOString()
                });
            }
            return agents;
        }

        function generateMockInteraction(agent) {
            const users = ['+34600123456', '+12025550100', '+525512345678', '+447911123456'];
            const summaries = [
                'Consulta sobre producto X', 'Reclamación de servicio Y', 'Solicitud de demo',
                'Soporte técnico inicial', 'Recolección de feedback', 'Proceso de venta cerrado'
            ];
            const statuses = ['success', 'failure', 'pending'];
            return {
                id: `int-${Math.random().toString(36).substr(2, 9)}`,
                agent_id: agent.id,
                agent_name: agent.name,
                user_phone: users[Math.floor(Math.random() * users.length)],
                summary: summaries[Math.floor(Math.random() * summaries.length)],
                status: statuses[Math.floor(Math.random() * statuses.length)],
                timestamp: new Date().toISOString(),
                details: {
                    duration_ms: Math.floor(Math.random() * 120000) + 5000, // 5s to 2min
                    messages_exchanged: Math.floor(Math.random() * 15) + 2
                }
            };
        }

        state.agents = generateMockAgents(30);
        for (let i = 0; i < 50; i++) { // Generate initial interactions
            const randomAgent = state.agents[Math.floor(Math.random() * state.agents.length)];
            state.interactions.push(generateMockInteraction(randomAgent));
        }
        state.interactions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)); // Newest first

        // Simulate realtime updates
        setInterval(() => {
            // New interaction
            const randomAgent = state.agents[Math.floor(Math.random() * state.agents.length)];
            state.interactions.unshift(generateMockInteraction(randomAgent));
            if (state.interactions.length > 100) state.interactions.pop(); // Keep logs manageable

            // Agent status change
            const agentToUpdate = state.agents[Math.floor(Math.random() * state.agents.length)];
            const statuses = ['online', 'offline', 'busy'];
            agentToUpdate.status = statuses[Math.floor(Math.random() * statuses.length)];
            agentToUpdate.last_seen = new Date().toISOString();

            if (state.activeTab === 'orchestrator' || state.activeTab === 'dashboard') renderOrchestrator();
            if (state.activeTab === 'dashboard') renderDashboard();
            if (state.activeTab === 'agents') renderAgentManagement();
        }, 5000); // Every 5 seconds

        // --- Render Functions ---

        function renderDashboard() {
            const activeAgents = state.agents.filter(a => a.status === 'online').length;
            const totalInteractions = state.interactions.length;
            const successRate = (state.interactions.filter(i => i.status === 'success').length / totalInteractions * 100).toFixed(1);

            appContent.innerHTML = `
                <h2 class="text-3xl font-bold mb-6 text-google-blue">Dashboard de Zapia Nexus</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                    <div class="bg-card p-6 rounded-lg shadow-md border border-base">
                        <p class="text-sm text-gray-400">Agentes Activos</p>
                        <p class="text-4xl font-bold mt-2">${activeAgents} / ${state.agents.length}</p>
                        <div class="flex items-center text-sm mt-3">
                            <i class="fas fa-check-circle text-green-500 mr-2"></i>
                            <span class="text-gray-400">${((activeAgents / state.agents.length) * 100).toFixed(0)}% operativos</span>
                        </div>
                    </div>
                    <div class="bg-card p-6 rounded-lg shadow-md border border-base">
                        <p class="text-sm text-gray-400">Interacciones Recientes</p>
                        <p class="text-4xl font-bold mt-2">${totalInteractions}</p>
                        <div class="flex items-center text-sm mt-3">
                            <i class="fas fa-chart-line text-google-blue mr-2"></i>
                            <span class="text-gray-400">Total de registros de interacción</span>
                        </div>
                    </div>
                    <div class="bg-card p-6 rounded-lg shadow-md border border-base">
                        <p class="text-sm text-gray-400">Tasa de Éxito</p>
                        <p class="text-4xl font-bold mt-2 ${successRate >= 80 ? 'text-green-500' : 'text-orange-500'}">${isNaN(successRate) ? 'N/A' : successRate + '%'}</p>
                        <div class="flex items-center text-sm mt-3">
                            <i class="fas fa-handshake text-purple-500 mr-2"></i>
                            <span class="text-gray-400">Interacciones completadas con éxito</span>
                        </div>
                    </div>
                </div>

                <div class="mb-8">
                    <h3 class="text-2xl font-semibold mb-4 text-google-blue">Actividad Reciente</h3>
                    <div class="bg-card p-4 rounded-lg shadow-md border border-base overflow-x-auto">
                        <table class="min-w-full text-left text-sm whitespace-nowrap">
                            <thead>
                                <tr class="border-b border-base text-gray-400 uppercase tracking-wider text-xs">
                                    <th class="py-2 px-4">Agente</th>
                                    <th class="py-2 px-4">Usuario</th>
                                    <th class="py-2 px-4">Resumen</th>
                                    <th class="py-2 px-4">Estado</th>
                                    <th class="py-2 px-4">Fecha</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${state.interactions.slice(0, 5).map(i => `
                                    <tr class="border-b border-base last:border-b-0 hover:bg-gray-800 transition-colors">
                                        <td class="py-2 px-4 font-medium">${i.agent_name}</td>
                                        <td class="py-2 px-4 text-gray-400">${i.user_phone}</td>
                                        <td class="py-2 px-4">${i.summary}</td>
                                        <td class="py-2 px-4"><span class="${getStatusClass(i.status)} font-medium">${i.status}</span></td>
                                        <td class="py-2 px-4 text-gray-400">${formatTimestamp(i.timestamp)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        ${state.interactions.length === 0 ? '<p class="text-center text-gray-400 py-4">No hay interacciones recientes.</p>' : ''}
                    </div>
                </div>

                <div>
                    <h3 class="text-2xl font-semibold mb-4 text-google-blue">Estado de los Agentes</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${state.agents.slice(0, 6).map(agent => `
                            <div class="bg-card p-4 rounded-lg shadow-sm border border-base flex items-center justify-between">
                                <div class="flex items-center">
                                    <i class="fas fa-robot text-xl mr-3 text-gray-500"></i>
                                    <div>
                                        <p class="font-medium">${agent.name}</p>
                                        <p class="text-xs ${getStatusClass(agent.status)} font-medium">${agent.status}</p>
                                    </div>
                                </div>
                                <button class="text-google-blue hover:text-blue-400 transition-colors" onclick="openAgentDetailModal('${agent.id}')">
                                    Ver <i class="fas fa-chevron-right ml-1 text-sm"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="mt-6 w-full text-center py-3 bg-gray-700 text-gray-200 rounded-lg hover:bg-gray-600 transition-colors font-medium md:max-w-xs" onclick="setActiveTab('agents')">
                        Ver todos los agentes <i class="fas fa-arrow-right ml-2 text-sm"></i>
                    </button>
                </div>
            `;
        }

        function renderOrchestrator() {
            appContent.innerHTML = `
                <h2 class="text-3xl font-bold mb-6 text-google-blue">Orquestador de Interacciones</h2>
                <div class="bg-card p-4 rounded-lg shadow-md border border-base max-h-[calc(100vh-180px)] overflow-y-auto">
                    ${state.interactions.length === 0 ? '<p class="text-center text-gray-400 py-4">No hay logs de interacción para mostrar.</p>' : ''}
                    <ul class="space-y-4">
                        ${state.interactions.map(i => `
                            <li class="p-4 rounded-md border border-base hover:bg-gray-800 transition-colors">
                                <div class="flex items-start justify-between mb-2">
                                    <p class="font-medium text-lg">${i.summary}</p>
                                    <span class="text-sm text-gray-400">${formatTimestamp(i.timestamp)}</span>
                                </div>
                                <div class="flex items-center text-sm mb-2">
                                    <i class="fas fa-robot mr-2 text-gray-500"></i>
                                    <span>Agente: <span class="font-medium text-google-blue">${i.agent_name}</span></span>
                                    <span class="mx-3 text-gray-600">|</span>
                                    <i class="fas fa-user-circle mr-2 text-gray-500"></i>
                                    <span>Usuario: <span class="font-medium">${i.user_phone}</span></span>
                                </div>
                                <p class="text-sm text-gray-400 mb-2">${i.details.messages_exchanged} mensajes intercambiados en ${Math.round(i.details.duration_ms / 1000)}s.</p>
                                <span class="px-3 py-1 rounded-full text-xs font-semibold ${getStatusClass(i.status)} border ${getStatusClass(i.status).replace('text-', 'border-')}">
                                    ${i.status.toUpperCase()}
                                </span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }

        function renderAgentManagement() {
            appContent.innerHTML = `
                <h2 class="text-3xl font-bold mb-6 text-google-blue">Gestión de Agentes (${state.agents.length})</h2>
                <div class="mb-6 flex flex-wrap gap-4 items-center justify-between">
                    <div class="relative flex-grow max-w-sm">
                        <input type="text" id="agent-search" placeholder="Buscar agente por nombre..." class="w-full pl-10 pr-4 py-2 bg-card border border-base rounded-lg focus:outline-none focus:ring-2 focus:ring-google-blue text-sm">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    </div>
                    <button class="bg-google-blue text-white px-5 py-2 rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center text-sm md:text-base">
                        <i class="fas fa-plus mr-2"></i>
                        Nuevo Agente
                    </button>
                </div>

                <div id="agents-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    ${state.agents.map(agent => `
                        <div class="bg-card p-5 rounded-lg shadow-md border border-base flex flex-col justify-between hover:border-google-blue transition-all">
                            <div>
                                <div class="flex items-center mb-3">
                                    <i class="fas fa-robot text-2xl mr-3 text-gray-500"></i>
                                    <h3 class="text-xl font-semibold text-google-blue truncate">${agent.name}</h3>
                                </div>
                                <p class="text-sm text-gray-400 mb-2">${agent.description}</p>
                                <div class="flex items-center mb-3">
                                    <span class="px-3 py-1 rounded-full text-xs font-semibold ${getStatusClass(agent.status)} border ${getStatusClass(agent.status).replace('text-', 'border-')}">
                                        ${agent.status.toUpperCase()}
                                    </span>
                                    <span class="ml-auto text-xs text-gray-500">Última actividad: ${formatTimestamp(agent.last_seen)}</span>
                                </div>
                            </div>
                            <div class="mt-4 flex flex-wrap gap-2">
                                <button class="flex-grow px-4 py-2 bg-gray-700 text-gray-200 rounded-md hover:bg-gray-600 transition-colors text-sm" onclick="openAgentDetailModal('${agent.id}')">
                                    <i class="fas fa-info-circle mr-2"></i>Detalles
                                </button>
                                <button class="flex-grow px-4 py-2 ${agent.status === 'online' ? 'bg-red-600 hover:bg-red-700' : 'bg-green-600 hover:bg-green-700'} text-white rounded-md transition-colors text-sm" onclick="toggleAgentStatus('${agent.id}')">
                                    <i class="fas fa-power-off mr-2"></i>${agent.status === 'online' ? 'Desactivar' : 'Activar'}
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            // Add search functionality
            document.getElementById('agent-search').addEventListener('input', (event) => {
                const searchTerm = event.target.value.toLowerCase();
                const filteredAgents = state.agents.filter(agent =>
                    agent.name.toLowerCase().includes(searchTerm) ||
                    agent.description.toLowerCase().includes(searchTerm) ||
                    agent.google_account_email.toLowerCase().includes(searchTerm)
                );
                document.getElementById('agents-grid').innerHTML = filteredAgents.map(agent => `
                    <div class="bg-card p-5 rounded-lg shadow-md border border-base flex flex-col justify-between hover:border-google-blue transition-all">
                        <div>
                            <div class="flex items-center mb-3">
                                <i class="fas fa-robot text-2xl mr-3 text-gray-500"></i>
                                <h3 class="text-xl font-semibold text-google-blue truncate">${agent.name}</h3>
                            </div>
                            <p class="text-sm text-gray-400 mb-2">${agent.description}</p>
                            <div class="flex items-center mb-3">
                                <span class="px-3 py-1 rounded-full text-xs font-semibold ${getStatusClass(agent.status)} border ${getStatusClass(agent.status).replace('text-', 'border-')}">
                                    ${agent.status.toUpperCase()}
                                </span>
                                <span class="ml-auto text-xs text-gray-500">Última actividad: ${formatTimestamp(agent.last_seen)}</span>
                            </div>
                        </div>
                        <div class="mt-4 flex flex-wrap gap-2">
                            <button class="flex-grow px-4 py-2 bg-gray-700 text-gray-200 rounded-md hover:bg-gray-600 transition-colors text-sm" onclick="openAgentDetailModal('${agent.id}')">
                                <i class="fas fa-info-circle mr-2"></i>Detalles
                            </button>
                            <button class="flex-grow px-4 py-2 ${agent.status === 'online' ? 'bg-red-600 hover:bg-red-700' : 'bg-green-600 hover:bg-green-700'} text-white rounded-md transition-colors text-sm" onclick="toggleAgentStatus('${agent.id}')">
                                <i class="fas fa-power-off mr-2"></i>${agent.status === 'online' ? 'Desactivar' : 'Activar'}
                            </button>
                        </div>
                    </div>
                `).join('');
            });
        }

        // --- Agent Detail Modal Logic ---
        function openAgentDetailModal(agentId) {
            const agent = state.agents.find(a => a.id === agentId);
            if (!agent) {
                modalContent.innerHTML = '<p class="text-red-500">Agente no encontrado.</p>';
                agentDetailModal.classList.remove('hidden');
                return;
            }

            modalContent.innerHTML = `
                <div class="mb-4">
                    <p class="text-xs text-gray-500">ID del Agente</p>
                    <p class="font-mono text-sm break-all">${agent.id}</p>
                </div>
                <div class="mb-4">
                    <p class="text-xs text-gray-500">Nombre</p>
                    <p class="font-medium">${agent.name}</p>
                </div>
                <div class="mb-4">
                    <p class="text-xs text-gray-500">Descripción</p>
                    <p>${agent.description}</p>
                </div>
                <div class="mb-4">
                    <p class="text-xs text-gray-500">Estado</p>
                    <span class="px-3 py-1 rounded-full text-xs font-semibold ${getStatusClass(agent.status)} border ${getStatusClass(agent.status).replace('text-', 'border-')}">
                        ${agent.status.toUpperCase()}
                    </span>
                </div>
                <div class="mb-4">
                    <p class="text-xs text-gray-500">Última Actividad</p>
                    <p class="text-sm">${formatTimestamp(agent.last_seen)}</p>
                </div>
                <div class="mb-4 border-t border-base pt-4">
                    <p class="text-md font-semibold mb-2 text-google-blue">Configuración de Conexión</p>
                    <div class="mb-3">
                        <p class="text-xs text-gray-500">Cuenta de Google</p>
                        <p class="font-mono text-sm break-all">${agent.google_account_email}</p>
                    </div>
                    <div class="mb-3">
                        <p class="text-xs text-gray-500">ID de Instancia Whapi</p>
                        <p class="font-mono text-sm break-all">${agent.whapi_instance_id}</p>
                    </div>
                    <div class="mb-3">
                        <p class="text-xs text-gray-500">Token Whapi (Parcial)</p>
                        <p class="font-mono text-sm break-all">${agent.whapi_token.substring(0, 8)}... (oculto por seguridad)</p>
                    </div>
                </div>
                <div class="border-t border-base pt-4">
                    <p class="text-md font-semibold mb-2 text-google-blue">Configuración de Comportamiento</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                        <div>
                            <p class="text-xs text-gray-500">Velocidad de Respuesta</p>
                            <p>${agent.settings.response_speed} / 5</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500">Análisis de Sentimiento</p>
                            <p>${agent.settings.sentiment_analysis ? 'Activado' : 'Desactivado'}</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500">Idioma Principal</p>
                            <p>${agent.settings.language.toUpperCase()}</p>
                        </div>
                    </div>
                </div>
            `;
            agentDetailModal.classList.remove('hidden');
        }

        function closeAgentDetailModal() {
            agentDetailModal.classList.add('hidden');
        }

        // --- Agent Actions (Mocked) ---
        function toggleAgentStatus(agentId) {
            const agentIndex = state.agents.findIndex(a => a.id === agentId);
            if (agentIndex > -1) {
                const newStatus = state.agents[agentIndex].status === 'online' ? 'offline' : 'online';
                state.agents[agentIndex].status = newStatus;
                state.agents[agentIndex].last_seen = new Date().toISOString(); // Update last seen on status change
                renderAgentManagement(); // Re-render the agent list
                if (state.activeTab === 'dashboard') renderDashboard(); // Update dashboard too
                alert(`Agente ${state.agents[agentIndex].name} ahora está ${newStatus.toUpperCase()}.`);
                // In a real scenario, you'd send an API call to Supabase to update the agent status
                // supabase.from('agents').update({ status: newStatus }).match({ id: agentId });
            }
        }


        // --- Navigation ---
        function setActiveTab(tab) {
            state.activeTab = tab;
            navItems.forEach(item => {
                if (item.dataset.tab === tab) {
                    item.classList.add('text-accent');
                    item.classList.remove('text-gray-400');
                } else {
                    item.classList.remove('text-accent');
                    item.classList.add('text-gray-400');
                }
            });
            renderContent();
        }

        function renderContent() {
            switch (state.activeTab) {
                case 'dashboard':
                    renderDashboard();
                    break;
                case 'orchestrator':
                    renderOrchestrator();
                    break;
                case 'agents':
                    renderAgentManagement();
                    break;
                default:
                    renderDashboard();
            }
        }

        navItems.forEach(item => {
            item.addEventListener('click', () => setActiveTab(item.dataset.tab));
        });

        // Initial render
        setActiveTab('dashboard');

    </script>
</body>
</html>
