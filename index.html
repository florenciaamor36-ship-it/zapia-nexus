<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Zapia Nexus | Google Cloud Design</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        body { background: #0b0e14; color: #e8eaed; font-family: sans-serif; }
        .g-card { background: #17191d; border: 1px solid #3c4043; border-radius: 8px; }
        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body class='flex h-screen overflow-hidden'>
    <aside class='sidebar w-64 border-r border-zinc-800 p-6 flex flex-col'>
        <div class='text-xl font-bold text-blue-400 mb-10'>Zapia Nexus</div>
        <nav class='space-y-4 flex-1 text-sm'>
            <div class='text-blue-400'>Dashboard</div>
            <div>Orquestador</div>
            <div>Agentes</div>
        </nav>
    </aside>
    <main class='flex-1 flex flex-col'>
        <header class='h-16 border-b border-zinc-800 flex items-center px-6 justify-between text-sm'>
            <div class='font-bold'>Dashboard General</div>
            <div class='flex items-center gap-2'><span class='text-emerald-400'>●</span> Online</div>
        </header>
        <div class='p-6 overflow-y-auto pb-24'>
            <div class='grid grid-cols-2 md:grid-cols-4 gap-4 mb-8'>
                <div class='g-card p-4'>
                    <div class='text-[10px] text-gray-500 uppercase'>Mensajes</div>
                    <div class='text-2xl font-light'>12,482</div>
                </div>
                <div class='g-card p-4'>
                    <div class='text-[10px] text-gray-500 uppercase'>Agentes</div>
                    <div class='text-2xl font-light'>28/30</div>
                </div>
            </div>
            <div class='g-card p-6 mb-8'>
                <div class='text-sm mb-4 text-blue-400 font-bold'>Orquestación Inter-Agente</div>
                <div class='space-y-2 font-mono text-[10px] text-gray-300'>
                    <p>[Zaira] Consulta técnica iniciada...</p>
                    <p>[Soporte] Procesando resolución...</p>
                </div>
            </div>
            <div class='grid grid-cols-5 md:grid-cols-10 gap-2' id='agents'></div>
        </div>
        <div class='md:hidden fixed bottom-0 w-full h-14 bg-zinc-900 border-t border-zinc-800 flex justify-around items-center text-[10px] font-bold'>
            <span class='text-blue-400'>DASH</span>
            <span>ORCH</span>
            <span>AGENTS</span>
        </div>
    </main>
    <script>
        const a = document.getElementById('agents');
        for(let i=1; i<=30; i++) {
            a.innerHTML += '<div class="g-card p-2 text-center text-[8px]">'+i+'</div>';
        }
    </script>
</body>
</html>
