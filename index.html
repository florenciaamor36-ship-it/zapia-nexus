<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS V46</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#000; color:#fff; margin:0; padding:0; overflow:hidden; height:100vh; width:100vw; display:flex; flex-direction:column;">
    <div style="height:60px; background:#111; border-bottom:1px solid #333; display:flex; align-items:center; padding:0 20px; justify-content:space-between;">
        <span style="color:#3b82f6; font-weight:bold;">ZAPIA NEXUS v46</span>
        <i class="fas fa-bolt" style="color:#fbbf24;"></i>
    </div>
    <div id="content" style="flex:1; padding:20px; overflow-y:auto; padding-bottom:100px;">
        <div id="sec-dash">
            <h2 style="font-size:24px; font-weight:bold; margin-bottom:20px;">Dashboard</h2>
            <div style="background:#1a1a1a; padding:20px; border-radius:12px; border:1px solid #333;">
                <div style="color:#888; font-size:12px;">STATUS</div>
                <div style="color:#10b981; font-size:28px; font-weight:bold;">SYSTEM ONLINE</div>
            </div>
        </div>
        <div id="sec-orch" style="display:none;">
            <h2 style="font-size:24px; font-weight:bold; margin-bottom:20px;">Orquestador</h2>
            <textarea id="cmd-in" style="width:100%; height:120px; background:#111; border:1px solid #444; border-radius:8px; color:#fff; padding:15px; margin-bottom:15px;" placeholder="Escribí tu orden..."></textarea>
            <button onclick="send()" style="width:100%; padding:15px; background:#2563eb; border:none; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer;">EJECUTAR</button>
        </div>
        <div id="sec-agents" style="display:none;">
            <h2 style="font-size:24px; font-weight:bold; margin-bottom:20px;">Agentes</h2>
            <div style="color:#888;">NEXUS Orchestration: 30 Agents Active.</div>
        </div>
    </div>
    <div id="nav" style="height:75px; background:#161616; border-top:1px solid #333; display:flex; align-items:center; justify-content:space-around; position:fixed; bottom:0; width:100%; padding-bottom:10px;">
        <div onclick="go('dash', this)" style="color:#3b82f6; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;">
            <i class="fas fa-th-large" style="font-size:22px;"></i><span style="font-size:10px; font-weight:bold;">DASH</span>
        </div>
        <div onclick="go('orch', this)" style="color:#888; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;">
            <i class="fas fa-terminal" style="font-size:22px;"></i><span style="font-size:10px; font-weight:bold;">ORCH</span>
        </div>
        <div onclick="go('agents', this)" style="color:#888; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;">
            <i class="fas fa-robot" style="font-size:22px;"></i><span style="font-size:10px; font-weight:bold;">AGENTS</span>
        </div>
    </div>
    <script>
        const sb = supabase.createClient('https://ypzudkxowpxvdggvongz.supabase.co', atob('c2Jfc2VjcmV0X1pJNThaVlZwbklGZERnX3lSemlOZ19hYlQ3VTFwZg=='));
        function go(s, el) {
            ['dash','orch','agents'].forEach(x => document.getElementById('sec-'+x).style.display = 'none');
            document.getElementById('sec-'+s).style.display = 'block';
            document.querySelectorAll('#nav > div').forEach(d => d.style.color = '#888');
            el.style.color = '#3b82f6';
        }
        async function send() {
            const i = document.getElementById('cmd-in');
            const v = i.value.trim();
            if(!v) return;
            const { error } = await sb.from('nexus_bus').insert([{ emisor:'MAESTRA', receptor:'Zapia-Alpha', mensaje:v, status:'pending' }]);
            if(!error) { i.value=''; alert('🚀 Orden enviada'); } else { alert('Error: '+error.message); }
        }
    </script>
</body>
</html>
