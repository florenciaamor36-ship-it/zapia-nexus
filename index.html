<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Zapia Nexus | Enterprise AI</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        body { font-family: sans-serif; background-color: #020617; color: #f8fafc; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .accent-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        aside { width: 260px; border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; }
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        header { padding: 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .card { background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid #1e293b; margin: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <aside class='glass'>
        <h2 style='color: #6366f1;'>ZAPIA NEXUS</h2>
        <nav style='flex: 1; margin-top: 20px;'>
            <button onclick='tab("dash")' class='btn' style='width: 100%; text-align: left; background: transparent; color: white;'>Dashboard</button>
            <button onclick='tab("orch")' class='btn' style='width: 100%; text-align: left; background: transparent; color: white;'>Orquestador</button>
            <button onclick='tab("agents")' class='btn' style='width: 100%; text-align: left; background: transparent; color: white;'>Agentes</button>
        </nav>
    </aside>
    <main>
        <header class='glass'>
            <h1 id='title'>Dashboard General</h1>
            <div style='color: #22c55e;'>● ONLINE</div>
        </header>
        <div id='dash' class='tab-content active'>
            <div class='grid'>
                <div class='card'><h3>Mensajes Hoy</h3><p style='font-size: 24px;'>12,482</p></div>
                <div class='card'><h3>Agentes</h3><p style='font-size: 24px;'>28 / 30</p></div>
                <div class='card'><h3>Latencia</h3><p style='font-size: 24px;'>1.2s</p></div>
            </div>
        </div>
        <div id='orch' class='tab-content' style='padding: 20px;'>
            <div class='card' style='height: 400px; overflow-y: auto;'>
                <p><b>Zaira (Ventas):</b> ¿Soporte listo para Personal Arg?</p>
                <p style='text-align: right; color: #a855f7;'><b>Zapia Soporte:</b> Listo. Iniciando protocolo...</p>
            </div>
            <div style='margin-top: 20px; display: flex; gap: 10px;'>
                <input type='text' placeholder='Orden global...' style='flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #020617; color: white;'>
                <button class='btn accent-gradient' style='color: white;'>EJECUTAR</button>
            </div>
        </div>
        <div id='agents' class='tab-content'>
            <div class='grid' id='grid'></div>
        </div>
    </main>
    <script>
        function tab(id) {
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.getElementById(id).classList.add("active");
            document.getElementById("title").innerText = id === "dash" ? "Dashboard" : (id === "orch" ? "Orquestador" : "Agentes");
            if(id === "agents") {
                const g = document.getElementById("grid");
                g.innerHTML = "";
                for(let i=1; i<=30; i++) g.innerHTML += "<div class='card'>Agente "+i+"<br><span style='font-size: 10px; color: #94a3b8;'>account_"+i+"@gmail.com</span></div>";
            }
        }
    </script>
</body>
</html>
