<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0'>
    <title>Zapia Nexus</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; margin: 0; }
        .tab { display: none; }
        .tab.active { display: block; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid #1e293b; }
        @media (max-width: 768px) { .sidebar { display: none; } .mobile-nav { display: flex; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #1e293b; background: #020617; } }
    </style>
</head>
<body class='h-screen flex flex-col md:flex-row'>
    <aside class='sidebar w-64 glass p-6 border-r border-slate-800 flex flex-col'>
        <h2 class='text-xl font-bold text-indigo-400 mb-8'>ZAPIA NEXUS</h2>
        <nav class='space-y-2 flex-1'>
            <button onclick='st("d")' class='w-full text-left p-3 rounded-lg hover:bg-slate-800'>Dashboard</button>
            <button onclick='st("o")' class='w-full text-left p-3 rounded-lg hover:bg-slate-800'>Orquestador</button>
            <button onclick='st("a")' class='w-full text-left p-3 rounded-lg hover:bg-slate-800'>Agentes</button>
        </nav>
    </aside>
    <nav class='mobile-nav hidden justify-around p-4 z-50'>
        <button onclick='st("d")'>DASH</button>
        <button onclick='st("o")'>ORCH</button>
        <button onclick='st("a")'>AGENTS</button>
    </nav>
    <main class='flex-1 overflow-y-auto p-4 md:p-10'>
        <div id='d' class='tab active'>
            <h1 class='text-3xl font-bold mb-6'>Dashboard</h1>
            <div class='grid grid-cols-2 md:grid-cols-3 gap-4'>
                <div class='glass p-6 rounded-2xl'><h3>Mensajes</h3><p class='text-2xl font-bold'>12.4k</p></div>
                <div class='glass p-6 rounded-2xl'><h3>Agentes</h3><p class='text-2xl font-bold'>28/30</p></div>
                <div class='glass p-6 rounded-2xl'><h3>Status</h3><p class='text-green-400 font-bold'>ONLINE</p></div>
            </div>
        </div>
        <div id='o' class='tab'>
            <h1 class='text-3xl font-bold mb-6'>Orquestador</h1>
            <div class='glass p-6 rounded-2xl h-[400px] overflow-y-auto space-y-4' id='chat'>
                <p><b>Zaira:</b> Cliente pregunta por soporte técnico.</p>
                <p class='text-indigo-400'><b>Soporte:</b> Tomando control de la consulta...</p>
            </div>
        </div>
        <div id='a' class='tab'>
            <h1 class='text-3xl font-bold mb-6'>Agentes (30)</h1>
            <div class='grid grid-cols-2 md:grid-cols-5 gap-4' id='grid'></div>
        </div>
    </main>
    <script>
        function st(id) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.getElementById(id).classList.add("active");
            if(id==="a") {
                const g = document.getElementById("grid"); g.innerHTML = "";
                for(let i=1; i<=30; i++) g.innerHTML += "<div class='glass p-4 rounded-xl text-xs'>Agente "+i+"</div>";
            }
        }
    </script>
</body>
</html>
